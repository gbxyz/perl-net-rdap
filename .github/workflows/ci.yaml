name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container: gbxyz/rdapper:latest
    steps:
      - uses: actions/checkout@v4
      - run: cpanm -n Carp::Always
      - run: cpanm -n File::XDG
      - run: perl Makefile.PL
      - run: make test
